version: 1
frontend:
  phases:
    preBuild:
      commands:
        # Amplify's build container is NOT root, so install everything into the
        # writable home directory instead of /usr/local.
        - 'export TOOLS="$HOME/tools"'
        - 'mkdir -p "$TOOLS/bin"'
        # --- Go toolchain (required: this theme uses Hugo Modules) ---
        - 'echo "Installing Go ${GO_VERSION}"'
        - 'curl -sSL "https://go.dev/dl/go${GO_VERSION}.linux-amd64.tar.gz" -o /tmp/go.tar.gz'
        - 'tar -C "$TOOLS" -xzf /tmp/go.tar.gz'
        - 'export PATH="$TOOLS/go/bin:$TOOLS/bin:$PATH"'
        - 'go version'
        # --- Hugo Extended (pinned; needs the extended build for SCSS + WebP) ---
        - 'echo "Installing Hugo Extended v${HUGO_VERSION}"'
        - 'curl -sSL "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.tar.gz" -o /tmp/hugo.tar.gz'
        - 'tar -xzf /tmp/hugo.tar.gz -C "$TOOLS/bin" hugo'
        - 'hugo version'
    build:
      commands:
        # Re-export PATH: env does not carry across phases. Go must be on PATH
        # so Hugo Modules can resolve. baseURL (https://danilab.org/) is set in
        # config/_default/hugo.yaml, and `hugo` builds in production by default.
        - 'export PATH="$HOME/tools/go/bin:$HOME/tools/bin:$PATH"'
        - 'hugo --gc --minify'
  artifacts:
    baseDirectory: public
    files:
      - '**/*'
  cache:
    paths:
      - 'resources/**/*'
